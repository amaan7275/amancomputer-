<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aman Computer Education — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  background:#e8f4ff;
  padding:1rem;
}

/* ── Card ─────────────────────────────────────────────── */
.card{
  display:flex;
  width:820px;min-height:520px;
  border-radius:20px;overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

/* ── Left Panel ───────────────────────────────────────── */
.left{
  flex:1.1;position:relative;overflow:hidden;
  background:white;
}
.left video,.left img.bg-img{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  object-fit:cover;
  padding:10px;border-radius:20px;
}
.overlay{
  position:absolute;inset:0;
  border-radius:20px;z-index:1;
}
.explore-text{
  position:absolute;bottom:32px;left:24px;z-index:2;
}
.explore-text p{
  font-size:30px;font-weight:900;color:#fff;
  line-height:1.2;text-shadow:0 2px 8px rgba(0,0,0,0.4);
  letter-spacing:0.5px;
}

/* ── Right Panel ──────────────────────────────────────── */
.right{
  flex:1;background:white;
  padding:2.5rem 2.2rem;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.logo-area{text-align:center;margin-bottom:1.5rem}
.logo-icon{
  width:44px;height:44px;margin:0 auto 6px;
  background:#1a3a5c;border-radius:50%;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.logo-icon svg{width:24px;height:24px;fill:white}
.logo-name{font-size:11px;font-weight:600;color:#888;letter-spacing:1.5px;text-transform:uppercase}
.welcome{font-size:24px;font-weight:800;color:#1a1a2e;letter-spacing:0.5px;text-align:center;margin-bottom:4px}
.sub{font-size:12px;color:#888;text-align:center;margin-bottom:1.8rem}

.form-full{width:100%}
label{display:block;font-size:11.5px;font-weight:600;color:#555;margin-bottom:5px;letter-spacing:0.3px}

input[type=text],input[type=email],input[type=password]{
  width:100%;padding:10px 13px;
  border:1.5px solid #e0e0e0;border-radius:9px;
  font-family:'Inter',sans-serif;font-size:13px;color:#333;
  outline:none;transition:border .2s,box-shadow .2s;background:#fafafa;
}
input:focus{border-color:#1a3a5c;box-shadow:0 0 0 3px rgba(26,58,92,0.1);background:white}
input::placeholder{color:#bbb}
input.valid{border-color:#22c55e}
input.invalid{border-color:#ef4444}
.field{margin-bottom:1rem}

/* Alert */
.alert{
  padding:10px 14px;border-radius:8px;
  font-size:12.5px;font-weight:500;
  margin-bottom:1rem;display:none;
  animation:fadeIn .2s ease;
}
.alert.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.alert.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.alert.admin{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.row{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.row label{margin:0;display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:400;color:#666;cursor:pointer}
.row a{font-size:11.5px;color:#1a3a5c;text-decoration:none;font-weight:500}

/* Buttons */
.btn-signin{
  width:100%;padding:11px;
  background:#1a1a2e;color:white;border:none;
  border-radius:9px;font-family:'Inter',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;
  transition:background .2s,transform .1s;
  margin-bottom:.9rem;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-signin:hover{background:#2d2d50;transform:translateY(-1px)}
.btn-signin:disabled{opacity:.7;cursor:not-allowed;transform:none}

.btn-google{
  width:100%;padding:10px;background:white;
  border:1.5px solid #e0e0e0;border-radius:9px;
  font-family:'Inter',sans-serif;font-size:13px;color:#333;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
  font-weight:500;transition:background .2s;margin-bottom:1rem;
}
.btn-google:hover{background:#f5f5f5}

/* ── Login Mode Toggle ─────────────────────────────────── */
.mode-toggle{
  display:flex;background:#f3f4f6;border-radius:10px;
  padding:4px;gap:4px;width:100%;margin-bottom:1.4rem;
}
.mode-btn{
  flex:1;padding:7px 0;border:none;border-radius:7px;
  font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;
  cursor:pointer;transition:all .18s;background:transparent;color:#888;
}
.mode-btn.active{
  background:white;color:#1a3a5c;
  box-shadow:0 1px 5px rgba(0,0,0,0.1);
}

/* Admin badge */
.admin-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:#fff7ed;border:1.5px solid #fed7aa;
  border-radius:8px;padding:5px 12px;
  font-size:11.5px;font-weight:600;color:#c2410c;
  margin-bottom:1rem;letter-spacing:.3px;
}

.signup-txt{text-align:center;font-size:12px;color:#888}
.signup-txt a{color:#1a3a5c;font-weight:600;text-decoration:none}

/* Spinner */
.spinner{
  width:15px;height:15px;
  border:2px solid rgba(255,255,255,.35);
  border-top-color:white;border-radius:50%;
  animation:spin .7s linear infinite;display:none;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Forgot Password Modal ── */
.fp-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
  z-index:999;align-items:center;justify-content:center;
}
.fp-overlay.show{display:flex}
.fp-box{
  background:white;border-radius:18px;
  padding:2rem 1.8rem;width:340px;
  box-shadow:0 30px 80px rgba(0,0,0,.2);
  animation:popIn .2s ease;
}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.fp-title{font-size:18px;font-weight:800;color:#1a1a2e;margin-bottom:5px}
.fp-sub{font-size:12px;color:#888;margin-bottom:1.2rem}
.fp-field{margin-bottom:.9rem}
.fp-field label{display:block;font-size:11.5px;font-weight:600;color:#555;margin-bottom:5px}
.fp-field input{
  width:100%;padding:10px 13px;
  border:1.5px solid #e0e0e0;border-radius:9px;
  font-family:'Inter',sans-serif;font-size:13px;color:#333;
  outline:none;transition:border .2s,box-shadow .2s;background:#fafafa;
}
.fp-field input:focus{border-color:#1a3a5c;box-shadow:0 0 0 3px rgba(26,58,92,.1);background:white}
.fp-alert{
  padding:9px 13px;border-radius:8px;font-size:12.5px;
  font-weight:500;margin-bottom:.9rem;display:none;
}
.fp-alert.error{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.fp-alert.success{background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0}
.fp-btns{display:flex;gap:.6rem;margin-top:.3rem}
.fp-btn-cancel{
  flex:1;padding:10px;border:1.5px solid #e0e0e0;border-radius:9px;
  background:white;font-family:'Inter',sans-serif;font-size:13px;
  font-weight:600;color:#666;cursor:pointer;transition:background .2s;
}
.fp-btn-cancel:hover{background:#f5f5f5}
.fp-btn-save{
  flex:1;padding:10px;border:none;border-radius:9px;
  background:#1a1a2e;font-family:'Inter',sans-serif;font-size:13px;
  font-weight:600;color:white;cursor:pointer;transition:background .2s;
}
.fp-btn-save:hover{background:#2d2d50}

/* Responsive */
@media(max-width:680px){
  .card{flex-direction:column;width:100%;min-height:auto}
  .left{min-height:160px}
  .right{padding:2rem 1.5rem}
}
</style>
</head>
<body>
<div class="card">

  <!-- LEFT PANEL -->
  <div class="left">
    <video autoplay muted loop playsinline>
      <source src="yati.mp4" type="video/mp4">
    </video>
    <div class="overlay"></div>
    <div class="explore-text">
      <p>EXPLORE.</p>
      <p>LEARN. GROW.</p>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="logo-name">Aman Computer Education</div>
    </div>

    <div class="welcome">WELCOME BACK</div>
    <div class="sub">Apna account choose karo aur login karo</div>

    <!-- ── Mode Toggle ── -->
    <div class="mode-toggle" id="modeToggle">
      <button class="mode-btn active" id="btnModeStudent" onclick="setMode('student')">👨‍🎓 Student</button>
      <button class="mode-btn"        id="btnModeAdmin"   onclick="setMode('admin')">🔐 Teacher</button>
    </div>

    <!-- Admin badge (shown only in admin mode) -->
    <div class="admin-badge" id="adminBadge" style="display:none">🔐 TEACHER ACCESS ONLY</div>

    <div class="alert" id="alertBox"></div>

    <div class="form-full">

      <!-- Email field (student mode) -->
      <div class="field" id="fieldEmail">
        <label for="loginId">Email</label>
        <input type="email" id="loginId" placeholder="Enter your email" autocomplete="email">
      </div>

      <!-- Username field (admin mode) — reuses same input, just label changes -->
      <div class="field" id="fieldUsername" style="display:none">
        <label for="adminUser">Admin Username</label>
        <input type="text" id="adminUser" placeholder="Enter admin username" autocomplete="off">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>

      <div class="row" id="rowExtras">
        <label>
          <input type="checkbox" id="rememberMe" style="width:auto;padding:0;border:none;background:none">
          Remember me
        </label>
        <a href="#" id="forgotLink">Forgot Password?</a>
      </div>

      <button class="btn-signin" id="loginBtn" onclick="handleLogin()">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Sign In</span>
      </button>

      <!-- Google button — only in student mode -->
      <button class="btn-google" id="btnGoogle" onclick="handleGoogleLogin()">
        <svg width="16" height="16" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.1 0 5.6 1.1 7.6 2.9l5.7-5.7C33.8 3.5 29.3 1.5 24 1.5 14.7 1.5 6.9 7.3 3.6 15.5l6.6 5.1C11.8 13.8 17.4 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.5 2.9-2.2 5.3-4.7 6.9l7.3 5.7c4.3-4 6.7-9.8 6.7-16.6z"/>
          <path fill="#FBBC05" d="M10.2 28.4A14.6 14.6 0 0 1 9.5 24c0-1.5.3-3 .7-4.4l-6.6-5.1A22.5 22.5 0 0 0 1.5 24c0 3.6.9 7.1 2.5 10.1l6.2-5.7z"/>
          <path fill="#34A853" d="M24 46.5c5.3 0 9.8-1.7 13.1-4.8l-7.3-5.7c-1.7 1.2-3.9 1.9-5.8 1.9-6.6 0-12.2-4.3-13.8-10.4l-6.2 5.7C6.9 40.7 14.7 46.5 24 46.5z"/>
        </svg>
        Sign in with Google
      </button>

      <div class="signup-txt" id="signupTxt">Don't have an account? <a href="signup.html">Sign up</a></div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
//  CURRENT MODE  ('student' | 'admin')
// ════════════════════════════════════════════════════════════
let currentMode = 'student';

function setMode(mode) {
  currentMode = mode;
  hideAlert();

  // Toggle buttons
  document.getElementById('btnModeStudent').classList.toggle('active', mode === 'student');
  document.getElementById('btnModeAdmin').classList.toggle('active',   mode === 'admin');

  // Show/hide fields
  document.getElementById('fieldEmail').style.display    = mode === 'student' ? '' : 'none';
  document.getElementById('fieldUsername').style.display = mode === 'admin'   ? '' : 'none';
  document.getElementById('adminBadge').style.display    = mode === 'admin'   ? 'inline-flex' : 'none';
  document.getElementById('btnGoogle').style.display     = mode === 'student' ? '' : 'none';
  document.getElementById('signupTxt').style.display     = mode === 'student' ? '' : 'none';
  document.getElementById('forgotLink').style.display    = mode === 'student' ? '' : 'none';

  // Update button label
  document.getElementById('btnText').textContent =
    mode === 'admin' ? 'Login to Admin Panel' : 'Sign In';

  // Clear fields
  document.getElementById('loginId').value  = '';
  document.getElementById('adminUser').value = '';
  document.getElementById('password').value  = '';
}

// ════════════════════════════════════════════════════════════
//  AUTH STORAGE HELPERS
// ════════════════════════════════════════════════════════════
function getUsers() {
  return JSON.parse(localStorage.getItem('ace_users') || '[]');
}
function findUser(email) {
  return getUsers().find(u => u.email === email.toLowerCase().trim());
}
function saveSession(user) {
  localStorage.setItem('ace_session', JSON.stringify({
    email: user.email, name: user.name,
    method: user.method || 'local',
    loggedInAt: new Date().toISOString()
  }));
}
function getSession() {
  try { return JSON.parse(localStorage.getItem('ace_session')); }
  catch { return null; }
}
function getAdminCreds() {
  try { return JSON.parse(localStorage.getItem('ace_admin_creds')) || { username:'admin', password:'aman@2026' }; }
  catch { return { username:'admin', password:'aman@2026' }; }
}
function saveAdminSession(username) {
  localStorage.setItem('ace_admin_session', JSON.stringify({
    username, loggedInAt: new Date().toISOString()
  }));
}

// ════════════════════════════════════════════════════════════
//  PAGE INIT
// ════════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  // Already logged in as student → go to dashboard
  if (getSession()) {
    window.location.href = 'home.html';
    return;
  }
  // Already logged in as admin → go to admin panel
  if (localStorage.getItem('ace_admin_session')) {
    window.location.href = 'admin.html';
    return;
  }

  // Restore remembered email
  const rem = localStorage.getItem('ace_remember');
  if (rem) {
    document.getElementById('loginId').value = rem;
    document.getElementById('rememberMe').checked = true;
  }
});

// ════════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════════
function showAlert(msg, type = 'error') {
  const box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = 'alert ' + type;
  box.style.display = 'block';
}
function hideAlert() {
  document.getElementById('alertBox').style.display = 'none';
}
function setLoading(on, adminMode) {
  document.getElementById('loginBtn').disabled = on;
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('btnText').textContent = on
    ? 'Logging in…'
    : (adminMode ? 'Login to Admin Panel' : 'Sign In');
}

// ════════════════════════════════════════════════════════════
//  UNIFIED LOGIN HANDLER
// ════════════════════════════════════════════════════════════
function handleLogin() {
  hideAlert();

  if (currentMode === 'admin') {
    handleAdminLogin();
  } else {
    handleStudentLogin();
  }
}

// ── Admin Login ──────────────────────────────────────────
function handleAdminLogin() {
  const username = document.getElementById('adminUser').value.trim();
  const password = document.getElementById('password').value;

  if (!username) { showAlert('Admin username bharo.'); return; }
  if (!password) { showAlert('Password bharo.'); return; }

  setLoading(true, true);

  setTimeout(() => {
    const creds = getAdminCreds();

    if (username !== creds.username || password !== creds.password) {
      showAlert('Galat username ya password. Dobara try karo.');
      setLoading(false, true);
      return;
    }

    // ✅ Admin login success
    saveAdminSession(username);
    showAlert('Admin login successful! Admin Panel pe ja rahe hain…', 'admin');

    setTimeout(() => {
      window.location.href = 'admin.html';
    }, 800);

    setLoading(false, true);
  }, 600);
}

// ── Student Login ────────────────────────────────────────
function handleStudentLogin() {
  const email    = document.getElementById('loginId').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('rememberMe').checked;

  if (!email) { showAlert('Email address bharo.'); return; }
  if (!/^\S+@\S+\.\S+$/.test(email)) { showAlert('Valid email address bharo.'); return; }
  if (!password) { showAlert('Password bharo.'); return; }

  setLoading(true, false);

  setTimeout(() => {
    const user = findUser(email);

    if (!user) {
      showAlert('Is email se koi account nahi mila. Pehle sign up karo.');
      setLoading(false, false);
      return;
    }
    if (user.password !== password) {
      showAlert('Galat password. Dobara try karo.');
      setLoading(false, false);
      return;
    }

    // ✅ Student login success
    if (remember) {
      localStorage.setItem('ace_remember', email);
    } else {
      localStorage.removeItem('ace_remember');
    }

    saveSession(user);
    showAlert('Login successful! Redirect ho rahe hain…', 'success');

    setTimeout(() => {
      window.location.href = 'home.html';
    }, 800);

    setLoading(false, false);
  }, 600);
}

// ════════════════════════════════════════════════════════════
//  GOOGLE LOGIN  (simulated)
// ════════════════════════════════════════════════════════════
function handleGoogleLogin() {
  const email = prompt('🔵 Google Sign-In Simulation\n\nApna Google email enter karo:');
  if (!email || !/^\S+@\S+\.\S+$/.test(email.trim())) {
    if (email !== null) alert('Valid email enter karo.');
    return;
  }
  const name = email.split('@')[0].replace(/[._]/g,' ')
    .replace(/\b\w/g, c => c.toUpperCase());
  const users = getUsers();
  let user = users.find(u => u.email === email.toLowerCase().trim());
  if (!user) {
    user = { name, email: email.toLowerCase().trim(), password: null,
             method: 'google', createdAt: new Date().toISOString() };
    users.push(user);
    localStorage.setItem('ace_users', JSON.stringify(users));
  }
  saveSession({ ...user, method: 'google' });
  window.location.href = 'home.html';
}

// ── Enter key submits form ──
document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

// ── Live email validation indicator ──
document.getElementById('loginId').addEventListener('blur', function () {
  if (!this.value) return;
  const ok = /^\S+@\S+\.\S+$/.test(this.value);
  this.classList.toggle('valid', ok);
  this.classList.toggle('invalid', !ok);
});

// ════════════════════════════════════════════════════════════
//  FORGOT PASSWORD
// ════════════════════════════════════════════════════════════
let fpStep = 1;

document.getElementById('forgotLink').addEventListener('click', function (e) {
  e.preventDefault();
  fpStep = 1;
  // Pre-fill email if already typed
  const typedEmail = document.getElementById('loginId').value.trim();
  document.getElementById('fpEmail').value = typedEmail;
  document.getElementById('fpNewPass').value = '';
  document.getElementById('fpConfPass').value = '';
  document.getElementById('fpEmailField').style.display = '';
  document.getElementById('fpPassField').style.display  = 'none';
  document.getElementById('fpConfField').style.display  = 'none';
  document.getElementById('fpBtn').textContent = 'Next →';
  document.getElementById('fpSubText').textContent = 'Apna registered email dalo — password reset karenge.';
  showFpAlert('', '');
  document.getElementById('fpOverlay').classList.add('show');
  document.getElementById('fpEmail').focus();
});

function showFpAlert(msg, type) {
  const a = document.getElementById('fpAlert');
  if (!msg) { a.style.display = 'none'; return; }
  a.textContent = msg;
  a.className = 'fp-alert ' + type;
  a.style.display = 'block';
}

function closeForgot() {
  document.getElementById('fpOverlay').classList.remove('show');
}

function handleForgotStep() {
  if (fpStep === 1) {
    // Step 1: verify email
    const email = document.getElementById('fpEmail').value.trim().toLowerCase();
    if (!email || !/^\S+@\S+\.\S+$/.test(email)) {
      showFpAlert('Valid email address dalo.', 'error'); return;
    }
    const user = findUser(email);
    if (!user) {
      showFpAlert('Is email se koi account nahi mila. Pehle sign up karo.', 'error'); return;
    }
    if (user.method === 'google') {
      showFpAlert('Yeh account Google se linked hai. Google se login karo.', 'error'); return;
    }
    // Move to step 2
    fpStep = 2;
    document.getElementById('fpEmailField').style.display = 'none';
    document.getElementById('fpPassField').style.display  = '';
    document.getElementById('fpConfField').style.display  = '';
    document.getElementById('fpBtn').textContent = '✅ Reset Password';
    document.getElementById('fpSubText').textContent = `Email: ${email} — Naya password set karo.`;
    showFpAlert('', '');
    document.getElementById('fpNewPass').focus();

  } else {
    // Step 2: save new password
    const email   = document.getElementById('fpEmail').value.trim().toLowerCase();
    const newPass = document.getElementById('fpNewPass').value;
    const confPass= document.getElementById('fpConfPass').value;
    if (!newPass || newPass.length < 6) {
      showFpAlert('Password kam se kam 6 characters ka hona chahiye.', 'error'); return;
    }
    if (newPass !== confPass) {
      showFpAlert('Dono passwords match nahi karte.', 'error'); return;
    }
    // Save
    const users = getUsers();
    const idx = users.findIndex(u => u.email === email);
    if (idx === -1) { showFpAlert('User nahi mila.', 'error'); return; }
    users[idx].password = newPass;
    localStorage.setItem('ace_users', JSON.stringify(users));
    showFpAlert('✅ Password reset ho gaya! Ab login karo.', 'success');
    document.getElementById('fpBtn').disabled = true;
    // Pre-fill login form & close after 1.5s
    document.getElementById('loginId').value = email;
    document.getElementById('password').value = '';
    setTimeout(() => {
      closeForgot();
      document.getElementById('fpBtn').disabled = false;
      fpStep = 1;
    }, 1500);
  }
}

// Close on backdrop click
document.getElementById('fpOverlay').addEventListener('click', function (e) {
  if (e.target === this) closeForgot();
});
// ESC closes modal
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeForgot(); });
</script>
<!-- FORGOT PASSWORD MODAL -->
<div class="fp-overlay" id="fpOverlay">
  <div class="fp-box">
    <div class="fp-title">🔑 Password Reset</div>
    <div class="fp-sub" id="fpSubText">Apna registered email aur naya password dalo.</div>
    <div class="fp-alert" id="fpAlert"></div>
    <div class="fp-field" id="fpEmailField">
      <label>Email Address</label>
      <input type="email" id="fpEmail" placeholder="Enter your email">
    </div>
    <div class="fp-field" id="fpPassField" style="display:none">
      <label>Naya Password</label>
      <input type="password" id="fpNewPass" placeholder="Min 6 characters">
    </div>
    <div class="fp-field" id="fpConfField" style="display:none">
      <label>Password Confirm Karo</label>
      <input type="password" id="fpConfPass" placeholder="Password dobara dalo">
    </div>
    <div class="fp-btns">
      <button class="fp-btn-cancel" onclick="closeForgot()">Cancel</button>
      <button class="fp-btn-save" id="fpBtn" onclick="handleForgotStep()">Next →</button>
    </div>
  </div>
</div>

</body>
